<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SimpleSites.RDX</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, sans-serif; display: flex; height: 100vh; overflow: hidden; }

  #menu {
    width: 220px;
    background: #1a1a1a;
    color: #fff;
    padding: 10px 0;
    position: relative;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  #menu.resizing { transition: none !important; }
  #menu:not(.resizing) { transition: width 0.15s ease; }

  #menuHeader { display: flex; align-items: center; justify-content: space-between; padding: 0 15px; margin-bottom: 10px; flex-shrink: 0; }
  #modeTabs { display: flex; gap: 14px; }
  .tab-btn { background: none; border: none; color: #888; font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; padding: 0; font-family: inherit; }
  .tab-btn.active-tab { color: #fff; }

  #collapseBtn { background: none; border: none; color: #888; cursor: pointer; font-size: 14px; padding: 4px 8px; flex-shrink: 0; }

  #menuList, #codeTree {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  #menuList::-webkit-scrollbar, #codeTree::-webkit-scrollbar { display: none; }
  #codeTree { display: none; }

  #menu .item { padding: 10px 15px; cursor: pointer; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #menu .item:hover { background: #2a2a2a; }
  #menu .item.active { background: #333; border-left: 3px solid #4da3ff; }

  /* ---------- Code tree ---------- */
  .tree-row { display: flex; align-items: center; gap: 6px; padding: 5px 10px; cursor: pointer; white-space: nowrap; overflow: hidden; color: #fff; font-size: 13px; }
  .tree-row:hover { background: #2a2a2a; }
  .tree-file-row.active { background: #333; border-left: 3px solid #4da3ff; }

  .tree-caret {
    display: inline-block;
    width: 10px;
    color: #888;
    font-size: 10px;
    flex-shrink: 0;
    text-align: center;
    transition: transform 0.15s ease;
    transform: rotate(0deg);
  }
  .tree-caret.expanded { transform: rotate(90deg); }

  .tree-folder-label { flex-shrink: 0; font-weight: 600; color: #eee; letter-spacing: 0.01em; }
  .tree-file-badge { font-size: 9px; font-weight: 700; flex-shrink: 0; width: 28px; text-align: center; }
  .tree-file-label { overflow: hidden; text-overflow: ellipsis; color: #aaa; }
  .tree-file-row.active .tree-file-label { color: #fff; }

  /* animated expand/collapse via CSS grid trick, no JS height math needed */
  .tree-children {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 0.18s ease;
  }
  .tree-children.expanded { grid-template-rows: 1fr; }
  .tree-children-inner { overflow: hidden; min-height: 0; }

  #menu.collapsed { width: 40px !important; overflow: hidden; }
  #menu.collapsed #modeTabs,
  #menu.collapsed #menuList,
  #menu.collapsed #codeTree { display: none; }

  #resizer { width: 3px; cursor: ew-resize; background: #1a1a1a; flex-shrink: 0; border-right: 1px solid #fff; }
  #resizer:hover, #resizer.active { width: 3px; background: #888; }

  #view { flex: 1; }
  #view iframe { width: 100%; height: 100%; border: none; display: block; }
  #placeholder { display: flex; align-items: center; justify-content: center; height: 100%; color: #888; font-family: sans-serif; }
  #error { padding: 15px; color: #f66; font-size: 13px; }

  /* ---------- Code viewer panel ---------- */
  #codeViewPanel { display: none; flex: 1; flex-direction: column; background: #1a1a1a; color: #fff; min-width: 0; }

  #codeHeader { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; border-bottom: 1px solid #333; font-size: 12px; color: #ccc; flex-shrink: 0; gap: 10px; }
  #codeBreadcrumb { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; display: flex; align-items: center; }
  #codeBreadcrumb .crumb-sep { color: #555; margin: 0 5px; flex-shrink: 0; }
  #codeBreadcrumb .crumb-dir { color: #888; flex-shrink: 0; }
  #codeBreadcrumb .crumb-file { color: #fff; font-weight: 600; overflow: hidden; text-overflow: ellipsis; }
  #codeBreadcrumb.empty { color: #666; font-style: italic; }

  #copyCodeBtn { background: #2a2a2a; border: 1px solid #444; color: #ccc; font-size: 11px; padding: 4px 10px; border-radius: 4px; cursor: pointer; flex-shrink: 0; }
  #copyCodeBtn:hover { background: #333; color: #fff; }
  #copyCodeBtn:disabled { opacity: 0.4; cursor: default; }
  #copyCodeBtn.copied { background: #234a2e; border-color: #2e6b3e; color: #7ee2a0; }

  #codeBody { flex: 1; overflow: hidden; position: relative; }
  #codeScroll { height: 100%; overflow: auto; display: flex; scrollbar-width: thin; scrollbar-color: #444 #1a1a1a; }
  #codeScroll::-webkit-scrollbar { width: 10px; height: 10px; }
  #codeScroll::-webkit-scrollbar-thumb { background: #444; border-radius: 5px; }
  #codeScroll::-webkit-scrollbar-track { background: #1a1a1a; }

  #lineNumbers {
    position: sticky; left: 0; z-index: 2;
    background: #1a1a1a; color: #6e7681;
    text-align: right; padding: 12px 10px 12px 16px;
    user-select: none; flex-shrink: 0;
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 13px; line-height: 20px; white-space: pre;
    border-right: 1px solid #262626;
  }
  #codePre { margin: 0; padding: 12px 20px; flex: 1 0 auto; }
  #codeContent { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 13px; line-height: 20px; white-space: pre; }
  .hljs { background: transparent !important; }

  #codeEmptyState {
    height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #666; font-size: 13px; gap: 6px; text-align: center; padding: 0 20px;
  }
  #codeEmptyState .emoji { font-size: 26px; opacity: 0.7; }

  .code-status { padding: 12px 20px; color: #888; font-size: 13px; font-style: italic; }
  .code-status.error { color: #f66; font-style: normal; }
</style>
</head>
<body>
  <div id="menu">
    <div id="menuHeader">
      <div id="modeTabs">
        <button class="tab-btn active-tab" id="tabSites" type="button">Sites</button>
        <button class="tab-btn" id="tabCode" type="button">Code</button>
      </div>
      <button id="collapseBtn" title="Collapse">◀</button>
    </div>
    <div id="menuList"></div>
    <div id="codeTree"></div>
  </div>
  <div id="resizer"></div>

  <div id="view"><div id="placeholder">Select a site from the menu</div></div>

  <div id="codeViewPanel">
    <div id="codeHeader">
      <div id="codeBreadcrumb" class="empty">No file selected</div>
      <button id="copyCodeBtn" type="button" disabled>Copy</button>
    </div>
    <div id="codeBody">
      <div id="codeEmptyState">
        <div class="emoji">🗂️</div>
        <div>Pick a file from the tree to read its source here.</div>
      </div>
      <div id="codeScroll" style="display:none;">
        <div id="lineNumbers"></div>
        <pre id="codePre"><code id="codeContent"></code></pre>
      </div>
    </div>
  </div>

<script>
// =====================================================================
// Sites tab — unchanged from the original working implementation.
// =====================================================================
fetch('sites.json')
  .then(r => r.json())
  .then(sites => {
    const menuList = document.getElementById('menuList');
    const view = document.getElementById('view');

    if (sites.length === 0) {
      menuList.innerHTML = '<div id="error">No sites found yet.</div>';
      return;
    }

    sites.forEach(site => {
      const item = document.createElement('div');
      item.className = 'item';
      item.textContent = site.name;
      item.addEventListener('click', () => {
        document.querySelectorAll('#menuList .item').forEach(el => el.classList.remove('active'));
        item.classList.add('active');
        view.innerHTML = `<iframe src="${site.url}"></iframe>`;
      });
      menuList.appendChild(item);
    });
  })
  .catch(err => {
    document.getElementById('menuList').innerHTML = `<div id="error">Failed to load sites.json: ${err.message}</div>`;
  });

// =====================================================================
// Code tab
// =====================================================================
const BINARY_EXTENSIONS = new Set(['png','jpg','jpeg','gif','webp','ico','bmp','woff','woff2','ttf','eot','otf','pdf','zip','gz','mp4','mp3','wav','mov','avi']);
const LANG_MAP = { html:'html', htm:'html', css:'css', js:'javascript', jsx:'javascript', ts:'javascript', tsx:'javascript', py:'python', json:'json', md:'markdown', xml:'xml', svg:'xml', yml:'yaml', yaml:'yaml' };

let currentFileContent = '';
let codeTreeLoaded = false;

// Cache of already-fetched file contents, keyed by path, so revisiting a
// file (a very common action when browsing source) is instant.
const fileCache = new Map();
// Bumped on every openFile call; guards against a slow fetch for an older
// click landing after a newer one and clobbering what's on screen.
let openFileToken = 0;
// Which folder paths are currently expanded, so re-rendering (or future
// features like search) doesn't silently collapse everything.
const expandedFolders = new Set();

function extOf(name) {
  return name.includes('.') ? name.split('.').pop().toLowerCase() : '';
}

function getFileBadge(name) {
  const ext = extOf(name);
  const map = {
    html: { label: 'HTM', color: '#e37933' },
    htm:  { label: 'HTM', color: '#e37933' },
    css:  { label: 'CSS', color: '#4fc1e9' },
    js:   { label: 'JS',  color: '#e8d44d' },
    jsx:  { label: 'JSX', color: '#e8d44d' },
    py:   { label: 'PY',  color: '#3ea6ff' },
    json: { label: '{ }', color: '#cbcb41' },
    md:   { label: 'MD',  color: '#8a9eb0' }
  };
  return map[ext] || { label: '\u2022', color: '#888' };
}

function renderBreadcrumb(path) {
  const crumb = document.getElementById('codeBreadcrumb');
  crumb.classList.remove('empty');
  crumb.innerHTML = '';

  const parts = path.split('/').filter(Boolean);
  parts.forEach((part, i) => {
    const isLast = i === parts.length - 1;
    const span = document.createElement('span');
    span.className = isLast ? 'crumb-file' : 'crumb-dir';
    span.textContent = part;
    crumb.appendChild(span);
    if (!isLast) {
      const sep = document.createElement('span');
      sep.className = 'crumb-sep';
      sep.textContent = '/';
      crumb.appendChild(sep);
    }
  });
}

function setCodeStatus(text, isError) {
  const codeScroll = document.getElementById('codeScroll');
  const emptyState = document.getElementById('codeEmptyState');
  codeScroll.style.display = 'none';
  emptyState.style.display = 'flex';
  emptyState.innerHTML = `<div class="code-status${isError ? ' error' : ''}">${text}</div>`;
  currentFileContent = '';
  document.getElementById('copyCodeBtn').disabled = true;
  document.getElementById('copyCodeBtn').classList.remove('copied');
}

function setCodeContent(text, lang, copyable) {
  const codeScroll = document.getElementById('codeScroll');
  const emptyState = document.getElementById('codeEmptyState');
  emptyState.style.display = 'none';
  codeScroll.style.display = 'flex';

  currentFileContent = copyable ? text : '';
  document.getElementById('copyCodeBtn').disabled = !copyable;
  document.getElementById('copyCodeBtn').classList.remove('copied');

  const oldCode = document.getElementById('codeContent');
  const pre = oldCode.parentElement;
  const fresh = document.createElement('code');
  fresh.id = 'codeContent';
  fresh.textContent = text;
  if (lang) fresh.className = 'language-' + lang;
  pre.replaceChild(fresh, oldCode);

  if (lang && window.hljs) {
    hljs.highlightElement(fresh);
  }

  document.getElementById('lineNumbers').textContent = copyable
    ? text.split('\n').map((_, i) => i + 1).join('\n')
    : '';
}

function openFile(node, rowEl) {
  document.querySelectorAll('.tree-file-row').forEach(r => r.classList.remove('active'));
  if (rowEl) rowEl.classList.add('active');

  renderBreadcrumb(node.path);
  const ext = extOf(node.name);
  const token = ++openFileToken;

  if (BINARY_EXTENSIONS.has(ext)) {
    setCodeStatus('Binary file — preview not available.', false);
    return;
  }

  const cached = fileCache.get(node.path);
  if (cached) {
    setCodeContent(cached.text, cached.lang, true);
    return;
  }

  setCodeStatus('Loading…', false);

  fetch(node.path)
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(text => {
      if (token !== openFileToken) return; // a newer click already took over
      const lang = LANG_MAP[ext] || null;
      fileCache.set(node.path, { text, lang });
      setCodeContent(text, lang, true);
    })
    .catch(err => {
      if (token !== openFileToken) return;
      setCodeStatus('Could not load file: ' + err.message, true);
    });
}

function renderTree(nodes, container, depth, parentPath) {
  nodes.forEach(node => {
    const nodePath = parentPath + '/' + node.name;
    const row = document.createElement('div');
    row.className = 'tree-row';
    row.style.paddingLeft = (depth * 16 + 10) + 'px';

    if (node.type === 'folder') {
      const caret = document.createElement('span');
      caret.className = 'tree-caret';
      caret.textContent = '\u25B8';
      row.appendChild(caret);

      const label = document.createElement('span');
      label.className = 'tree-folder-label';
      label.textContent = node.name;
      row.appendChild(label);

      const childrenWrap = document.createElement('div');
      childrenWrap.className = 'tree-children';
      const childrenInner = document.createElement('div');
      childrenInner.className = 'tree-children-inner';
      childrenWrap.appendChild(childrenInner);
      renderTree(node.children, childrenInner, depth + 1, nodePath);

      const isExpanded = expandedFolders.has(nodePath);
      if (isExpanded) {
        childrenWrap.classList.add('expanded');
        caret.classList.add('expanded');
      }

      row.addEventListener('click', () => {
        const nowExpanded = !childrenWrap.classList.contains('expanded');
        childrenWrap.classList.toggle('expanded', nowExpanded);
        caret.classList.toggle('expanded', nowExpanded);
        if (nowExpanded) {
          expandedFolders.add(nodePath);
        } else {
          expandedFolders.delete(nodePath);
        }
      });

      container.appendChild(row);
      container.appendChild(childrenWrap);
    } else {
      const info = getFileBadge(node.name);
      const badge = document.createElement('span');
      badge.className = 'tree-file-badge';
      badge.textContent = info.label;
      badge.style.color = info.color;
      row.appendChild(badge);

      const label = document.createElement('span');
      label.className = 'tree-file-label';
      label.textContent = node.name;
      row.appendChild(label);

      row.classList.add('tree-file-row');
      row.addEventListener('click', () => openFile(node, row));
      container.appendChild(row);
    }
  });
}

document.getElementById('copyCodeBtn').addEventListener('click', (e) => {
  if (!currentFileContent) return;
  navigator.clipboard.writeText(currentFileContent).then(() => {
    const btn = e.currentTarget;
    btn.classList.add('copied');
    const original = btn.textContent;
    btn.textContent = 'Copied';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.textContent = original;
    }, 1200);
  }).catch(() => {});
});

// ---------- Mode switching (Sites <-> Code) ----------
const tabSites = document.getElementById('tabSites');
const tabCode = document.getElementById('tabCode');
const menuListEl = document.getElementById('menuList');
const codeTreeEl = document.getElementById('codeTree');
const viewEl = document.getElementById('view');
const codeViewPanelEl = document.getElementById('codeViewPanel');

tabSites.addEventListener('click', () => {
  tabSites.classList.add('active-tab');
  tabCode.classList.remove('active-tab');
  menuListEl.style.display = '';
  codeTreeEl.style.display = 'none';
  viewEl.style.display = '';
  codeViewPanelEl.style.display = 'none';
});

tabCode.addEventListener('click', () => {
  tabCode.classList.add('active-tab');
  tabSites.classList.remove('active-tab');
  menuListEl.style.display = 'none';
  codeTreeEl.style.display = '';
  viewEl.style.display = 'none';
  codeViewPanelEl.style.display = 'flex';

  if (!codeTreeLoaded) {
    codeTreeEl.innerHTML = '<div class="code-status" style="padding:10px 15px;">Loading repository tree…</div>';
    fetch('repo-tree.json')
      .then(r => r.json())
      .then(tree => {
        codeTreeEl.innerHTML = '';
        renderTree(tree, codeTreeEl, 0, '');
        codeTreeLoaded = true;
      })
      .catch(err => {
        codeTreeEl.innerHTML = `<div id="error">Could not load repo-tree.json: ${err.message}</div>`;
      });
  }
});

// ---------- Resizable + collapsible sidebar ----------
const resizer = document.getElementById('resizer');
const menu = document.getElementById('menu');
const collapseBtn = document.getElementById('collapseBtn');
let isResizing = false;
let lastWidth = 220;

function setArrow(collapsed) {
  collapseBtn.textContent = collapsed ? '\u25B6' : '\u25C0';
}

resizer.addEventListener('mousedown', () => {
  isResizing = true;
  menu.classList.add('resizing');
  resizer.classList.add('active');
  document.body.style.userSelect = 'none';
});

document.addEventListener('mousemove', (e) => {
  if (!isResizing) return;
  let newWidth = e.clientX;
  if (newWidth < 40) newWidth = 40;
  if (newWidth > 500) newWidth = 500;
  menu.style.width = newWidth + 'px';
  const collapsed = newWidth <= 60;
  menu.classList.toggle('collapsed', collapsed);
  setArrow(collapsed);
});

document.addEventListener('mouseup', () => {
  if (isResizing) {
    isResizing = false;
    menu.classList.remove('resizing');
    resizer.classList.remove('active');
    document.body.style.userSelect = '';
    if (menu.offsetWidth > 60) lastWidth = menu.offsetWidth;
  }
});

collapseBtn.addEventListener('click', () => {
  const collapsed = menu.classList.contains('collapsed');
  if (collapsed) {
    menu.classList.remove('collapsed');
    menu.style.width = lastWidth + 'px';
    setArrow(false);
  } else {
    lastWidth = menu.offsetWidth > 60 ? menu.offsetWidth : lastWidth;
    menu.classList.add('collapsed');
    menu.style.width = '40px';
    setArrow(true);
  }
});
</script>
</body>
</html>
