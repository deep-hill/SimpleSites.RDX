<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwiftCart</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 0;
    }

    body {
      background: #f4f4f6;
      color: #222;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: #ffffff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      position: sticky;
      top: 0;
      gap: 1rem;
    }

    input, button {
      padding: 0.5rem 0.8rem;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    input[type="search"] {
      border-radius: 20px;
      width: 100%;
      max-width: 300px;
    }

    .btn {
      background: #2563eb;
      color: #ffffff;
      border: none;
      cursor: pointer;
      font-weight: 600;
      width: 100%;
      margin-top: 0.5rem;
    }

    .btn-sub {
      background: #64748b;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      padding: 2rem;
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: #ffffff;
      padding: 1rem;
      border-radius: 8px;
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 6px;
    }

    .drawer {
      position: fixed;
      right: -360px;
      top: 0;
      width: 320px;
      height: 100%;
      background: #ffffff;
      padding: 1.5rem;
      transition: 0.3s ease;
      display: flex;
      flex-direction: column;
      z-index: 100;
    }

    .drawer.open {
      right: 0;
    }

    .cart-items {
      flex: 1;
      overflow-y: auto;
      margin: 1rem 0;
      border-block: 1px solid #eee;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 0;
    }

    dialog {
      margin: auto;
      border: none;
      border-radius: 8px;
      padding: 2rem;
      width: 90%;
      max-width: 400px;
    }

    dialog::backdrop {
      background: rgba(0, 0, 0, 0.5);
    }

    dialog input {
      width: 100%;
      margin: 0.4rem 0 1rem;
    }
  </style>
</head>
<body>

  <header>
    <h2>SwiftCart</h2>
    <input type="search" placeholder="Search products..." oninput="render(this.value)">
    <button class="btn" style="width: auto; margin: 0;" onclick="toggleCart()">
      Cart (<span id="cart-count">0</span>)
    </button>
  </header>

  <main class="products" id="product-list"></main>

  <div class="drawer" id="drawer">
    <h3>Your Cart</h3>
    <div class="cart-items" id="cart-items"></div>
    <h4>Total: $<span id="cart-total">0.00</span></h4>
    <button class="btn" onclick="openCheckout()">Proceed to Checkout</button>
    <button class="btn btn-sub" onclick="toggleCart()">Close</button>
  </div>

  <dialog id="modal">
    <div id="modal-body">
      <h3>Checkout Details</h3>
      <form onsubmit="processOrder(event)">
        <label>Full Name</label>
        <input type="text" required placeholder="John Doe">
        <label>Email</label>
        <input type="email" required placeholder="john@example.com">
        <label>Address</label>
        <input type="text" required placeholder="123 Main St">
        <button class="btn" type="submit">Complete Order</button>
        <button class="btn btn-sub" type="button" onclick="document.getElementById('modal').close()">Cancel</button>
      </form>
    </div>
  </dialog>

  <script>
    const products = [
      { id: 1, name: "Prod1", price: 99, img: "" },
      { id: 2, name: "Prod2", price: 149, img: "" },
      { id: 3, name: "Prod3", price: 49, img: "" },
      { id: 4, name: "Prod4", price: 120, img: "" }
    ];
    let cart = [];
    function render(filter = "") {
      const filtered = products.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));
      document.getElementById('product-list').innerHTML = filtered.map(p => `
        <div class="card">
          <img src="${p.img}">
          <h3>${p.name}</h3>
          <p>$${p.price}</p>
          <button class="btn" onclick="updateQty(${p.id}, 1)">Add to Cart</button>
        </div>
      `).join('');
    }
    function toggleCart() {
      document.getElementById('drawer').classList.toggle('open');
    }
    function updateQty(id, delta) {
      let item = cart.find(i => i.id === id);
      if (!item && delta > 0) {
        item = { ...products.find(p => p.id === id), qty: 0 };
        cart.push(item);
      }
      if (item) item.qty += delta;
      cart = cart.filter(i => i.qty > 0);
      document.getElementById('cart-count').innerText = cart.reduce((s, i) => s + i.qty, 0);
      document.getElementById('cart-items').innerHTML = cart.map(i => `
        <div class="cart-item">
          <div><b>${i.name}</b><br><small>$${i.price} x ${i.qty}</small></div>
          <div>
            <button onclick="updateQty(${i.id}, -1)">-</button>
            <span>${i.qty}</span>
            <button onclick="updateQty(${i.id}, 1)">+</button>
          </div>
        </div>
      `).join('');
      const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
      document.getElementById('cart-total').innerText = total.toFixed(2);
      document.getElementById('drawer').classList.add('open');
    }
    function openCheckout() {
      if (!cart.length) return alert('Cart is empty!');
      document.getElementById('modal').showModal();
    }
    function processOrder(e) {
      e.preventDefault();
      const total = cart.reduce((s, i) => s + i.price * i.qty, 0).toFixed(2);
      document.getElementById('modal-body').innerHTML = `
        <h2 style="color: #16a34a;">🎉 Order Success!</h2>
        <p><b>Order ID:</b> #${Math.floor(100000 + Math.random() * 900000)}</p>
        <hr style="margin: 0.8rem 0;">
        ${cart.map(i => `<p>${i.name} (x${i.qty}) - $${i.price * i.qty}</p>`).join('')}
        <h3 style="margin-top: 0.8rem;">Total Paid: $${total}</h3>
        <button class="btn" onclick="window.print()">🖨️ Print Receipt (PDF)</button>
        <button class="btn btn-sub" onclick="location.reload()">Close</button>
      `;
      cart = [];
    }
    render();
  </script>
</body>
</html>
